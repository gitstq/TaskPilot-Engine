# Multi-LLM Pipeline Example
# 多LLM后端流水线示例

name: multi-llm-pipeline
description: Pipeline demonstrating multi-step LLM orchestration with parallel execution
version: "1.0.0"
max_parallel: 4

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.5
  max_tokens: 2048

variables:
  topic: "artificial intelligence"
  language: "English"

steps:
  # Phase 1: Research (parallel tasks)
  - name: research-overview
    type: llm_call
    description: Generate overview of the topic
    config:
      system: "You are a research assistant."
      prompt: "Provide a brief overview of {{topic}} in {{language}}."

  - name: research-trends
    type: llm_call
    description: Identify current trends
    config:
      system: "You are a trend analyst."
      prompt: "List 5 current trends in {{topic}}."

  - name: research-challenges
    type: llm_call
    description: Identify key challenges
    config:
      system: "You are a technology analyst."
      prompt: "What are the main challenges in {{topic}}?"

  # Phase 2: Synthesis (depends on all research)
  - name: synthesize-findings
    type: llm_call
    description: Combine all research into a summary
    depends_on:
      - research-overview
      - research-trends
      - research-challenges
    config:
      system: "You are a senior analyst. Synthesize research findings."
      prompt: |
        Based on the following research:
        Overview: {{research-overview}}
        Trends: {{research-trends}}
        Challenges: {{research-challenges}}

        Provide a comprehensive summary with actionable insights.

  # Phase 3: Output formatting
  - name: format-output
    type: transform
    description: Format the final output
    depends_on:
      - synthesize-findings
    config:
      transform: template
      template: |
        # Research Report: {{topic}}

        {{synthesize-findings}}

        ---
        Generated by TaskPilot-CLI
